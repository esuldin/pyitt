name: Dependabot Auto-approve

on:
  workflow_call:

jobs:
  dependabot-auto-approve:
    permissions:
      actions: write
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Check Dependabot metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
      - name: Approve a PR
        run: gh pr review "${{github.event.pull_request.html_url}}" --approve
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Merge a PR
        id: gh-merge
        run: gh pr merge "${{github.event.pull_request.html_url}}" --delete-branch --squash
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        continue-on-error: true
      - name: Run CI workflow
        if: steps.gh-merge.outcome == 'success'
        run: |
          gh workflow run ci.yml --ref "${{github.event.pull_request.base.ref}}" \
            --repo "${{github.event.pull_request.base.repo.html_url}}"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Rebase PR
        if: steps.gh-merge.outcome == 'failure'
        run: |
          gh pr update-branch "${{github.event.pull_request.number}}" --rebase \
            --repo "${{github.event.pull_request.base.repo.html_url}}"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
